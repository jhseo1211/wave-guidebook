<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>응답 대시보드 | 빛과 소리의 캔버스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #faf9f6;
  --accent: #2d6a9f;
  --accent-light: #e8f1f8;
  --accent-glow: #4a9eda;
  --warm: #c44536;
  --warm-light: #fdf0ee;
  --gold: #d4a843;
  --gold-light: #fdf8ec;
  --sage: #5a7a64;
  --sage-light: #eef4f0;
  --muted: #6b7280;
  --border: #e5e2dc;
  --card-bg: #ffffff;
  --section-bg: #f5f3ef;
  --radius: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.6;
}

/* ═══════ HEADER ═══════ */
.dashboard-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #2d3a5e 100%);
  color: #fff;
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.dashboard-header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.3rem;
  font-weight: 700;
}
.dashboard-header .subtitle {
  font-size: 0.82rem;
  opacity: 0.7;
  margin-top: 2px;
}
.header-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.btn-icon {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.82rem;
  transition: background 0.2s;
}
.btn-icon:hover { background: rgba(255,255,255,0.22); }
.btn-icon.active { background: var(--accent); border-color: var(--accent); }

/* ═══════ FILTER BAR ═══════ */
.filter-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.82rem;
}
.filter-group label {
  font-weight: 600;
  color: var(--muted);
  white-space: nowrap;
}
.filter-group .chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  font-size: 0.78rem;
  transition: all 0.2s;
  user-select: none;
}
.filter-group .chip.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.filter-group .chip:hover { border-color: var(--accent-glow); }

.view-toggle {
  margin-left: auto;
  display: flex;
  gap: 4px;
  background: var(--section-bg);
  border-radius: 8px;
  padding: 3px;
}
.view-btn {
  padding: 4px 12px;
  border: none;
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s;
}
.view-btn.active {
  background: #fff;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.search-input {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.82rem;
  width: 140px;
  outline: none;
}
.search-input:focus { border-color: var(--accent); }

/* ═══════ MAIN LAYOUT ═══════ */
.main-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 120px);
}

/* ═══════ QUESTION SELECTOR ═══════ */
.question-selector {
  background: var(--card-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 120px);
  position: sticky;
  top: 46px;
}
.selector-header {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.selector-header h3 {
  font-size: 0.88rem;
  font-weight: 700;
}
.selected-count {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
  background: var(--accent-light);
  padding: 2px 8px;
  border-radius: 12px;
}
.category-group {
  border-bottom: 1px solid var(--border);
}
.category-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1rem;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--ink);
  background: var(--section-bg);
  user-select: none;
  transition: background 0.2s;
}
.category-header:hover { background: var(--accent-light); }
.category-header .arrow {
  font-size: 0.7rem;
  transition: transform 0.2s;
  color: var(--muted);
}
.category-header .arrow.open { transform: rotate(90deg); }
.category-header .cat-tag {
  font-size: 0.68rem;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
}
.cat-tag.act { background: #e0f2fe; color: #0369a1; }
.cat-tag.concept { background: #fef3c7; color: #92400e; }
.cat-tag.sup { background: #fce7f3; color: #9d174d; }
.cat-tag.mission { background: #fef3c7; color: #92400e; }
.cat-tag.sound { background: #e0f2fe; color: #0369a1; }
.cat-tag.res { background: #d1fae5; color: #065f46; }
.cat-tag.pen { background: #e0f2fe; color: #0369a1; }
.cat-tag.cmp { background: #ede9fe; color: #5b21b6; }
.cat-tag.adv { background: #fce7f3; color: #9d174d; }
.cat-tag.reflect { background: #d1fae5; color: #065f46; }

.category-select-all {
  margin-left: auto;
  font-size: 0.7rem;
  color: var(--accent);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.category-select-all:hover { background: var(--accent-light); }
.category-body {
  display: none;
  padding: 0.3rem 0;
}
.category-body.open { display: block; }
.field-item {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.3rem 1rem 0.3rem 1.5rem;
  font-size: 0.78rem;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.15s;
}
.field-item:hover { background: var(--accent-light); }
.field-item input[type="checkbox"] {
  margin-top: 3px;
  accent-color: var(--accent);
  flex-shrink: 0;
}
.field-item .field-label {
  line-height: 1.4;
}

.selector-footer {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  position: sticky;
  bottom: 0;
  background: var(--card-bg);
}
.btn-query {
  flex: 1;
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-query:hover { background: #245a8a; }
.btn-query:disabled { background: var(--muted); cursor: not-allowed; }
.btn-clear {
  padding: 8px 12px;
  background: var(--section-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.82rem;
  cursor: pointer;
}
.btn-clear:hover { background: var(--border); }

/* ═══════ RESPONSE BOARD ═══════ */
.response-board {
  padding: 1.2rem;
  overflow-y: auto;
}
.board-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  color: var(--muted);
  text-align: center;
  gap: 0.8rem;
}
.board-empty .icon { font-size: 3rem; opacity: 0.4; }
.board-empty h3 { font-size: 1rem; font-weight: 600; }
.board-empty p { font-size: 0.85rem; }

.loading-spinner {
  display: none;
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}
.loading-spinner.active { display: block; }
.loading-spinner .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 3px;
  animation: bounce 1.2s infinite;
}
.loading-spinner .dot:nth-child(2) { animation-delay: 0.2s; }
.loading-spinner .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

/* ═══════ QUESTION PANEL (그룹 뷰) ═══════ */
.question-panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 1.2rem;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.question-panel-header {
  padding: 0.8rem 1rem;
  background: var(--section-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
}
.question-panel-header .q-cat {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.question-panel-header .q-text {
  font-size: 0.88rem;
  font-weight: 600;
  flex: 1;
  min-width: 200px;
}
.question-panel-header .q-count {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
}
.question-panel-body { padding: 0.8rem 1rem; }

.answer-group {
  margin-bottom: 0.8rem;
}
.answer-group:last-child { margin-bottom: 0; }
.group-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.4rem;
  font-size: 0.82rem;
}
.group-label {
  font-weight: 600;
  color: var(--ink);
  background: var(--accent-light);
  padding: 2px 10px;
  border-radius: 6px;
  max-width: 80%;
  word-break: break-word;
}
.group-count {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
}
.student-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding-left: 0.5rem;
}
.student-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 0.72rem;
  background: var(--section-bg);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.student-chip:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.student-chip .class-badge {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--accent);
}
.group-other .group-label {
  background: var(--warm-light);
  color: var(--warm);
}

/* ═══════ STUDENT VIEW ═══════ */
.student-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.student-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.student-card-header {
  padding: 0.6rem 1rem;
  background: var(--section-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.student-card-header .name {
  font-weight: 700;
  font-size: 0.88rem;
}
.student-card-header .info {
  font-size: 0.75rem;
  color: var(--muted);
}
.student-card-body { padding: 0.6rem 1rem; }
.student-answer-row {
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  font-size: 0.8rem;
}
.student-answer-row:last-child { border-bottom: none; }
.student-answer-row .q-label {
  font-weight: 600;
  color: var(--accent);
  font-size: 0.72rem;
  margin-bottom: 2px;
}

/* ═══════ TABLE VIEW ═══════ */
.table-view-wrapper {
  overflow-x: auto;
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.response-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}
.response-table th {
  position: sticky;
  top: 0;
  background: var(--section-bg);
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
  font-size: 0.72rem;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.response-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.response-table tr:hover td { background: var(--accent-light); }

/* ═══════ PROJECTOR MODE ═══════ */
body.projector .question-panel-header .q-text { font-size: 1.2rem; }
body.projector .group-label { font-size: 1rem; padding: 4px 14px; }
body.projector .student-chip { font-size: 0.88rem; padding: 5px 12px; }
body.projector .group-count { font-size: 0.88rem; }
body.projector .student-card-header .name { font-size: 1.1rem; }
body.projector .student-answer-row { font-size: 0.95rem; }

/* ═══════ RESPONSIVE ═══════ */
@media (max-width: 1024px) {
  .main-layout { grid-template-columns: 1fr; }
  .question-selector {
    position: relative;
    top: auto;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .question-selector.collapsed .category-group,
  .question-selector.collapsed .selector-header { display: none; }
  .selector-toggle {
    display: flex;
    padding: 0.6rem 1rem;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    align-items: center;
    justify-content: space-between;
    background: var(--section-bg);
  }
}
@media (min-width: 1025px) {
  .selector-toggle { display: none; }
}
@media (max-width: 640px) {
  .dashboard-header { flex-direction: column; align-items: flex-start; padding: 1rem; }
  .filter-bar { padding: 0.5rem 0.8rem; gap: 0.5rem; }
  .response-board { padding: 0.8rem; }
  .student-card-grid { grid-template-columns: 1fr; }
  .view-toggle { margin-left: 0; }
  .search-input { width: 100%; }
}

/* ═══════ STATUS BAR ═══════ */
.status-bar {
  padding: 0.6rem 1.2rem;
  background: var(--accent-light);
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  color: var(--accent);
  display: none;
  align-items: center;
  gap: 0.5rem;
}
.status-bar.active { display: flex; }
.status-bar .status-text { font-weight: 500; }

/* ═══════ SCRIPT URL INPUT ═══════ */
.url-config {
  padding: 1.5rem;
  text-align: center;
}
.url-config input {
  width: 100%;
  max-width: 600px;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  outline: none;
  margin-bottom: 0.8rem;
}
.url-config input:focus { border-color: var(--accent); }
.url-config .hint {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
}
.btn-save-url {
  padding: 8px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}

/* ═══════ TOOLTIP ═══════ */
.tooltip {
  display: none;
  position: fixed;
  background: var(--ink);
  color: #fff;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 0.78rem;
  max-width: 300px;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  line-height: 1.5;
  pointer-events: none;
}
.tooltip.show { display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="dashboard-header">
  <div>
    <h1>응답 대시보드</h1>
    <div class="subtitle">빛과 소리의 캔버스 - 학생 응답 보기</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleProjector()" id="projectorBtn" title="프로젝터 모드">🖥 프로젝터</button>
    <button class="btn-icon" onclick="refreshData()" title="새로고침">🔄 새로고침</button>
    <a href="index.html" class="btn-icon" style="text-decoration:none;">📝 가이드북</a>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar">
  <span class="status-text" id="statusText"></span>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <label>반:</label>
    <span class="chip active" data-class="all" onclick="toggleClassFilter(this)">전체</span>
    <span class="chip" data-class="1" onclick="toggleClassFilter(this)">1반</span>
    <span class="chip" data-class="2" onclick="toggleClassFilter(this)">2반</span>
    <span class="chip" data-class="3" onclick="toggleClassFilter(this)">3반</span>
    <span class="chip" data-class="4" onclick="toggleClassFilter(this)">4반</span>
    <span class="chip" data-class="5" onclick="toggleClassFilter(this)">5반</span>
  </div>
  <div class="filter-group">
    <input type="text" class="search-input" id="studentSearch" placeholder="학생 이름 검색" oninput="applyFilters()">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="group" onclick="switchView('group')">그룹 보기</button>
    <button class="view-btn" data-view="student" onclick="switchView('student')">학생별 보기</button>
    <button class="view-btn" data-view="table" onclick="switchView('table')">표 보기</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- QUESTION SELECTOR -->
  <aside class="question-selector" id="questionSelector">
    <div class="selector-toggle" onclick="toggleSelectorPanel()">
      <span>질문 선택 패널</span>
      <span id="toggleArrow">▼</span>
    </div>
    <div class="selector-header">
      <h3>질문 선택</h3>
      <span class="selected-count" id="selectedCount">0개 선택</span>
    </div>
    <div id="categoryList"></div>
    <div class="selector-footer">
      <button class="btn-clear" onclick="clearSelection()">초기화</button>
      <button class="btn-query" id="queryBtn" onclick="queryResponses()" disabled>조회</button>
    </div>
  </aside>

  <!-- RESPONSE BOARD -->
  <section class="response-board" id="responseBoard">
    <div class="loading-spinner" id="loadingSpinner">
      <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <p style="margin-top:0.8rem;">데이터를 불러오는 중...</p>
    </div>
    <div class="board-empty" id="boardEmpty">
      <div class="icon">📋</div>
      <h3>질문을 선택하고 조회하세요</h3>
      <p>왼쪽 패널에서 보고 싶은 질문을 체크한 후<br>"조회" 버튼을 누르세요.</p>
    </div>
    <div id="boardContent"></div>
  </section>

</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<!-- URL CONFIG MODAL (초기 설정) -->
<div id="urlConfigOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:none; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:16px; padding:2rem; max-width:640px; width:90%; box-shadow:var(--shadow-lg);">
    <h3 style="margin-bottom:0.5rem;">Google Apps Script URL 설정</h3>
    <p class="hint">Apps Script 웹 앱 배포 URL을 입력하세요. (doGet 지원 필요)</p>
    <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <br>
    <button class="btn-save-url" onclick="saveScriptUrl()">저장</button>
  </div>

function showUrlConfig() {
  const overlay = document.getElementById('urlConfigOverlay');
  overlay.style.display = 'flex';
}

function saveScriptUrl() {
  const input = document.getElementById('scriptUrlInput');
  const url = input.value.trim();
  if (!url) return;
  scriptUrl = url;
  localStorage.setItem('dashboard_script_url', url);
  document.getElementById('urlConfigOverlay').style.display = 'none';
  showStatus('URL 저장 완료. 질문을 선택하고 조회하세요.');
}

// ═══════════════════════════════════════════
// CATEGORY LIST BUILD
// ═══════════════════════════════════════════
function buildCategoryList() {
  const container = document.getElementById('categoryList');
  const categories = {};

  FIELD_META.forEach(f => {
    if (!categories[f.category]) categories[f.category] = { catTag: f.catTag, fields: [] };
    categories[f.category].fields.push(f);
  });

  const catOrder = ['활동1','개념에너지','중첩','미션','실험A','실험B','실험C','종합정리','실험D','공명','단진자','비교','심화','성찰'];

  let html = '';
  catOrder.forEach(cat => {
    if (!categories[cat]) return;
    const { catTag, fields } = categories[cat];
    html += `
      <div class="category-group">
        <div class="category-header" onclick="toggleCategory(this)">
          <span class="arrow">▶</span>
          <span class="cat-tag ${catTag}">${cat}</span>
          <span style="flex:1">${fields.length}개 질문</span>
          <span class="category-select-all" onclick="event.stopPropagation(); toggleCategoryAll('${cat}')">전체 선택</span>
        </div>
        <div class="category-body" data-category="${cat}">
          ${fields.map(f => `
            <div class="field-item" onclick="toggleField(this, '${f.field}')">
              <input type="checkbox" data-field="${f.field}">
              <span class="field-label">${f.label}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function toggleCategory(el) {
  const arrow = el.querySelector('.arrow');
  const body = el.nextElementSibling;
  arrow.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleField(el, field) {
  const cb = el.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  if (cb.checked) selectedFields.add(field);
  else selectedFields.delete(field);
  updateSelectedCount();
}

function toggleCategoryAll(cat) {
  const body = document.querySelector(`.category-body[data-category="${cat}"]`);
  const checkboxes = body.querySelectorAll('input[type="checkbox"]');
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => {
    cb.checked = !allChecked;
    const field = cb.dataset.field;
    if (cb.checked) selectedFields.add(field);
    else selectedFields.delete(field);
  });
  updateSelectedCount();
}

function clearSelection() {
  document.querySelectorAll('.category-body input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
  });
  selectedFields.clear();
  updateSelectedCount();
}

function updateSelectedCount() {
  document.getElementById('selectedCount').textContent = `${selectedFields.size}개 선택`;
  document.getElementById('queryBtn').disabled = selectedFields.size === 0;
}

function toggleSelectorPanel() {
  const sel = document.getElementById('questionSelector');
  sel.classList.toggle('collapsed');
  document.getElementById('toggleArrow').textContent = sel.classList.contains('collapsed') ? '▶' : '▼';
}

// ═══════════════════════════════════════════
// DATA FETCH
// ═══════════════════════════════════════════
async function fetchData() {
  if (!scriptUrl) {
    showUrlConfig();
    return false;
  }
  showLoading(true);
  showStatus('데이터를 불러오는 중...');
  try {
    const res = await fetch(scriptUrl);
    const json = await res.json();
    if (json.status === 'ok') {
      allData = json.data;
      showStatus(`${allData.length}명의 응답을 불러왔습니다.`);
      return true;
    } else {
      showStatus('데이터 형식 오류. Apps Script doGet() 확인 필요.');
      return false;
    }
  } catch (err) {
    showStatus('데이터 로딩 실패: ' + err.message);
    return false;
  } finally {
    showLoading(false);
  }
}

async function queryResponses() {
  if (selectedFields.size === 0) return;
  if (allData.length === 0) {
    const ok = await fetchData();
    if (!ok) return;
  }
  applyFilters();
  renderBoard();
}

async function refreshData() {
  allData = [];
  const ok = await fetchData();
  if (ok && selectedFields.size > 0) {
    applyFilters();
    renderBoard();
  }
}

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
function toggleClassFilter(el) {
  const cls = el.dataset.class;
  if (cls === 'all') {
    activeClasses.clear();
    activeClasses.add('all');
    document.querySelectorAll('.filter-group .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  } else {
    const allChip = document.querySelector('.chip[data-class="all"]');
    activeClasses.delete('all');
    allChip.classList.remove('active');
    if (el.classList.contains('active')) {
      el.classList.remove('active');
      activeClasses.delete(cls);
      if (activeClasses.size === 0) {
        activeClasses.add('all');
        allChip.classList.add('active');
      }
    } else {
      el.classList.add('active');
      activeClasses.add(cls);
    }
  }
  if (allData.length > 0 && selectedFields.size > 0) {
    applyFilters();
    renderBoard();
  }
}

function applyFilters() {
  const search = document.getElementById('studentSearch').value.trim().toLowerCase();
  filteredData = allData.filter(row => {
    if (!activeClasses.has('all')) {
      const cls = String(row['반'] || row['class'] || '').replace(/[^0-9]/g, '');
      if (!activeClasses.has(cls)) return false;
    }
    if (search) {
      const name = String(row['이름'] || row['name'] || '').toLowerCase();
      if (!name.includes(search)) return false;
    }
    return true;
  });
}

// ═══════════════════════════════════════════
// GROUPING ALGORITHM
// ═══════════════════════════════════════════
function normalizeText(text) {
  if (!text || typeof text !== 'string') return '';
  return text.trim().toLowerCase()
    .replace(/[은는이가을를에의로으로와과도만까지부터마다에서](?: |$)/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function extractKeywords(text) {
  const norm = normalizeText(text);
  if (!norm) return new Set();
  return new Set(norm.split(' ').filter(w => w.length > 1));
}

function jaccardSimilarity(setA, setB) {
  if (setA.size === 0 && setB.size === 0) return 1;
  if (setA.size === 0 || setB.size === 0) return 0;
  let intersection = 0;
  for (const item of setA) {
    if (setB.has(item)) intersection++;
  }
  return intersection / (setA.size + setB.size - intersection);
}

function groupAnswers(answers) {
  if (answers.length === 0) return [];

  const isShortOrNumeric = answers.every(a => {
    const val = String(a.value).trim();
    return val.length <= 5 || /^[\d.]+\s*[a-zA-Z가-힣]*$/.test(val);
  });

  if (isShortOrNumeric) {
    const groups = {};
    answers.forEach(a => {
      const key = normalizeText(String(a.value)) || '(빈 응답)';
      if (!groups[key]) groups[key] = { label: a.value, members: [] };
      groups[key].members.push(a);
    });
    return Object.values(groups).sort((a, b) => b.members.length - a.members.length);
  }

  const processed = answers.map(a => ({
    ...a,
    keywords: extractKeywords(String(a.value)),
    normalized: normalizeText(String(a.value))
  }));

  const clusters = [];
  const assigned = new Set();

  processed.forEach((item, i) => {
    if (assigned.has(i)) return;
    if (!item.normalized) {
      assigned.add(i);
      return;
    }
    const cluster = { members: [item], keywords: new Set(item.keywords) };
    assigned.add(i);

    processed.forEach((other, j) => {
      if (assigned.has(j) || !other.normalized) return;
      const sim = jaccardSimilarity(item.keywords, other.keywords);
      if (sim > 0.4) {
        cluster.members.push(other);
        assigned.add(j);
        other.keywords.forEach(k => cluster.keywords.add(k));
      }
    });

    clusters.push(cluster);
  });

  const others = processed.filter((_, i) => !assigned.has(i) || !processed[i].normalized);

  const result = clusters
    .map(c => {
      const freqs = {};
      c.members.forEach(m => {
        const val = String(m.value).trim();
        freqs[val] = (freqs[val] || 0) + 1;
      });
      const label = Object.entries(freqs).sort((a, b) => b[1] - a[1])[0][0];
      return { label, members: c.members, isOther: false };
    })
    .sort((a, b) => b.members.length - a.members.length);

  if (others.length > 0) {
    result.push({ label: '기타', members: others, isOther: true });
  }

  return result;
}

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
function renderBoard() {
  const content = document.getElementById('boardContent');
  const empty = document.getElementById('boardEmpty');
  empty.style.display = 'none';

  switch (currentView) {
    case 'group': content.innerHTML = renderGroupView(); break;
    case 'student': content.innerHTML = renderStudentView(); break;
    case 'table': content.innerHTML = renderTableView(); break;
  }
}

function renderGroupView() {
  const fields = FIELD_META.filter(f => selectedFields.has(f.field));
  if (fields.length === 0 || filteredData.length === 0) return '<div class="board-empty"><div class="icon">📭</div><h3>표시할 데이터가 없습니다</h3></div>';

  return fields.map(f => {
    const answers = filteredData
      .filter(row => {
        const val = row[f.field];
        return val !== undefined && val !== null && String(val).trim() !== '';
      })
      .map(row => ({
        value: row[f.field],
        name: row['이름'] || row['name'] || '?',
        class: row['반'] || row['class'] || '?',
        num: row['번호'] || row['number'] || ''
      }));

    const groups = groupAnswers(answers);
    const totalCount = answers.length;

    return `
      <div class="question-panel">
        <div class="question-panel-header">
          <span class="q-cat cat-tag ${f.catTag}">${f.category}</span>
          <span class="q-text">${f.label}</span>
          <span class="q-count">${totalCount}명 응답</span>
        </div>
        <div class="question-panel-body">
          ${groups.length === 0 ? '<p style="color:var(--muted); font-size:0.82rem;">응답 없음</p>' :
            groups.map(g => `
              <div class="answer-group ${g.isOther ? 'group-other' : ''}">
                <div class="group-header">
                  <span class="group-label">${escapeHtml(truncate(g.label, 80))}</span>
                  <span class="group-count">(${g.members.length}명)</span>
                </div>
                <div class="student-chips">
                  ${g.members.map(m => `
                    <span class="student-chip" onmouseenter="showTooltip(event, '${escapeAttr(String(m.value))}')" onmouseleave="hideTooltip()">
                      <span class="class-badge">${m.class}반${m.num}</span>
                      ${escapeHtml(m.name)}
                    </span>
                  `).join('')}
                </div>
              </div>
            `).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderStudentView() {
  const fields = FIELD_META.filter(f => selectedFields.has(f.field));
  if (fields.length === 0 || filteredData.length === 0) return '<div class="board-empty"><div class="icon">📭</div><h3>표시할 데이터가 없습니다</h3></div>';

  return `<div class="student-card-grid">${filteredData.map(row => {
    const name = row['이름'] || row['name'] || '?';
    const cls = row['반'] || row['class'] || '?';
    const num = row['번호'] || row['number'] || '';
    const answers = fields
      .filter(f => {
        const val = row[f.field];
        return val !== undefined && val !== null && String(val).trim() !== '';
      })
      .map(f => ({ label: f.label, category: f.category, value: row[f.field] }));

    if (answers.length === 0) return '';

    return `
      <div class="student-card">
        <div class="student-card-header">
          <span class="name">${escapeHtml(name)}</span>
          <span class="info">${cls}반 ${num}번</span>
        </div>
        <div class="student-card-body">
          ${answers.map(a => `
            <div class="student-answer-row">
              <div class="q-label">[${a.category}] ${a.label}</div>
              <div>${escapeHtml(String(a.value))}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }).join('')}</div>`;
}

function renderTableView() {
  const fields = FIELD_META.filter(f => selectedFields.has(f.field));
  if (fields.length === 0 || filteredData.length === 0) return '<div class="board-empty"><div class="icon">📭</div><h3>표시할 데이터가 없습니다</h3></div>';

  return `
    <div class="table-view-wrapper">
      <table class="response-table">
        <thead>
          <tr>
            <th>이름</th><th>반</th><th>번호</th>
            ${fields.map(f => `<th title="${f.label}">${truncate(f.label, 20)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${filteredData.map(row => `
            <tr>
              <td>${escapeHtml(row['이름'] || row['name'] || '')}</td>
              <td>${row['반'] || row['class'] || ''}</td>
              <td>${row['번호'] || row['number'] || ''}</td>
              ${fields.map(f => `<td title="${escapeAttr(String(row[f.field] || ''))}">${escapeHtml(truncate(String(row[f.field] || ''), 30))}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (filteredData.length > 0 && selectedFields.size > 0) renderBoard();
}

// ═══════════════════════════════════════════
// PROJECTOR MODE
// ═══════════════════════════════════════════
function toggleProjector() {
  document.body.classList.toggle('projector');
  document.getElementById('projectorBtn').classList.toggle('active');
}

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function showLoading(show) {
  document.getElementById('loadingSpinner').classList.toggle('active', show);
  if (show) {
    document.getElementById('boardEmpty').style.display = 'none';
    document.getElementById('boardContent').innerHTML = '';
  }
}

function showStatus(text) {
  const bar = document.getElementById('statusBar');
  document.getElementById('statusText').textContent = text;
  bar.classList.add('active');
  setTimeout(() => bar.classList.remove('active'), 5000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max) + '...' : str;
}

function showTooltip(e, text) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.classList.add('show');
  tip.style.left = e.clientX + 10 + 'px';
  tip.style.top = e.clientY + 10 + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}
</script>
